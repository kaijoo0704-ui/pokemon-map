<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Pokemon Coordinates</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:8px 15px;
cursor:pointer;
}

</style>

</head>


<body>

<h1>Pokemon Coordinates</h1>

<div id="list">
Loading...
</div>


<script>

fetch("pokelid.csv")

.then(response => response.text())

.then(csv => {


let rows = csv.split("\n");


let html = "";


rows.shift(); // 删除标题


rows.forEach((row,index)=>{


let data = row.split(",");


let name = data[0];
let lat = data[1];
let lng = data[2];


html += `

<div class="card">

<h3>${name}</h3>

<p id="coord${index}">
${lat},${lng}
</p>

<button onclick="copy('coord${index}')">
Copy Coordinate
</button>

</div>

`;

});


document.getElementById("list").innerHTML = html;


});


function copy(id){

let text =
document.getElementById(id).innerText;


navigator.clipboard.writeText(text);


alert("Copied!");

}

</script>


</body>
</html>
