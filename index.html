<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Pokemon Coordinates</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:8px 15px;
cursor:pointer;
}

</style>

</head>


<body>

<h1>Pokemon Coordinates</h1>

<div id="list">
Loading...
</div>


<script>

fetch("pokelid.csv")

.then(response => response.text())

.then(csv => {


let rows = csv.split("\n");


let html = "";


// 删除第一行标题
rows.shift();


rows.forEach((row,index)=>{


if(!row.trim()) return;


// 分割每一行
let firstSplit = row.split("\t");


// 地区
let prefecture = firstSplit[0];


// 坐标
let coordinates = firstSplit[1];



html += `

<div class="card">

<h3>${prefecture}</h3>

<p id="coord${index}">
${coordinates}
</p>

<button onclick="copy('coord${index}')">
Copy Coordinate
</button>

</div>

`;

});


document.getElementById("list").innerHTML = html;


});


function copy(id){

let text =
document.getElementById(id).innerText;


navigator.clipboard.writeText(text);


alert("Copied!");

}

</script>


</body>
</html>
