<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Pokemon Coordinates</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:8px 15px;
cursor:pointer;
}

</style>

</head>


<body>

<h1>Pokemon Coordinates</h1>

<div id="list"></div>


<script>

fetch("pokelid.json")

.then(response => response.json())

.then(data => {


let html = "";


data.forEach((item,index)=>{


html += `

<div class="card">

<h3>${item.name}</h3>

<p id="coord${index}">
${item.lat},${item.lng}
</p>

<button onclick="copy('coord${index}')">
Copy Coordinate
</button>


</div>

`;


});


document.getElementById("list").innerHTML = html;


});


function copy(id){

const text =
document.getElementById(id).innerText;


navigator.clipboard.writeText(text);


alert("Copied!");

}


</script>


</body>
</html>
